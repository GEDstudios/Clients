<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Scroll States</title>
    <style>
        body { margin: 0; padding: 0; background-color: #0A0A3F; overflow: hidden; overscroll-behavior-y: none; touch-action: none; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: sans-serif; }
        #rive-container { width: 1920px; height: 1080px; max-width: 100vw; max-height: 100vh; }
        canvas { width: 100%; height: 100%; pointer-events: none; }
        
        .nav-arrow { position: fixed; top: 50%; transform: translateY(-50%); font-size: 40px; color: rgba(255, 255, 255, 0.4); cursor: pointer; user-select: none; z-index: 100; padding: 20px; transition: 0.2s; }
        .nav-arrow:hover { color: #fff; transform: translateY(-50%) scale(1.1); }
        .nav-arrow:active { transform: translateY(-50%) scale(0.9); }
        #left-arrow { left: 20px; }
        #right-arrow { right: 20px; }

        #timing-indicator { position: fixed; left: 40px; bottom: 40px; display: flex; align-items: center; gap: 10px; pointer-events: none; z-index: 100; opacity: 0; transition: opacity 0.1s; color: rgba(255,255,255,0.6); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; }
        #triangle { fill: white; transition: transform 0.05s ease-out; }

        #dots-container { position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; gap: 16px; z-index: 100; }
        .dot { width: 12px; height: 12px; border-radius: 50%; background: rgba(255, 255, 255, 0.3); cursor: pointer; transition: 0.2s; }
        .dot:hover { background: rgba(255, 255, 255, 0.6); }
        .dot.active { background: #fff; transform: scale(1.3); }
    </style>
</head>
<body>

    <div id="left-arrow" class="nav-arrow" onclick="changeState(-1, true)">&#10094;</div>
    <div id="rive-container"><canvas id="canvas"></canvas></div>
    <div id="right-arrow" class="nav-arrow" onclick="changeState(1, true)">&#10095;</div>
    
    <div id="timing-indicator">
        <span>Scrolling</span>
        <svg id="triangle" width="24" height="24" viewBox="0 0 24 24"><polygon points="12,4 4,20 20,20" /></svg>
    </div>

    <div id="dots-container">
        <div class="dot active" onclick="setState(0)"></div>
        <div class="dot" onclick="setState(1)"></div>
        <div class="dot" onclick="setState(2)"></div>
    </div>

    <script src="https://unpkg.com/@rive-app/webgl2/rive.js"></script>
    <script>
        let currentState = 0; 
        let updateBools = () => {}; 
        
        const WHEEL_THRESHOLD = 80, TOUCH_THRESHOLD = 50;
        const indicatorWrap = document.getElementById('timing-indicator');
        const triangle = document.getElementById('triangle');
        const dots = document.querySelectorAll('.dot');
        let indicatorTimeout, wheelDelta = 0, touchStartY = 0;

        const setState = (index) => {
            if (currentState !== index) {
                currentState = index;
                dots.forEach((dot, i) => dot.classList.toggle('active', i === currentState));
                updateBools();
            }
        };

        const changeState = (direction, loop = false) => {
            let nextState = loop 
                ? (currentState + direction + 3) % 3 
                : Math.max(0, Math.min(2, currentState + direction));
            
            if (nextState !== currentState) {
                setState(nextState);
                indicatorWrap.style.opacity = 1;
                triangle.style.transform = `rotate(${direction > 0 ? 180 : 0}deg) scale(1.2)`;
                setTimeout(() => { indicatorWrap.style.opacity = 0; }, 200);
            }
        };

        const updateIndicator = (accumulatedDelta, threshold) => {
            if (accumulatedDelta === 0) return;
            const progress = Math.min(1, Math.abs(accumulatedDelta) / threshold);
            indicatorWrap.style.opacity = progress;
            triangle.style.transform = `rotate(${accumulatedDelta > 0 ? 180 : 0}deg) scale(${0.4 + (progress * 0.6)})`;

            clearTimeout(indicatorTimeout);
            indicatorTimeout = setTimeout(() => {
                wheelDelta = 0; indicatorWrap.style.opacity = 0;
            }, 150); 
        };

        document.addEventListener('wheel', (e) => {
            wheelDelta += e.deltaY;
            updateIndicator(wheelDelta, WHEEL_THRESHOLD);
            if (Math.abs(wheelDelta) >= WHEEL_THRESHOLD) { 
                changeState(Math.sign(wheelDelta));
                wheelDelta = 0; 
            }
        }, { passive: false });

        document.addEventListener('touchstart', (e) => touchStartY = e.touches[0].clientY, { passive: false });
        document.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            let currentDelta = touchStartY - e.touches[0].clientY;
            updateIndicator(currentDelta, TOUCH_THRESHOLD);
            if (Math.abs(currentDelta) >= TOUCH_THRESHOLD) {
                changeState(Math.sign(currentDelta));
                touchStartY = e.touches[0].clientY; 
            }
        }, { passive: false });

        const riveInstance = new rive.Rive({
            src: 'rotategirl2.riv',
            canvas: document.getElementById('canvas'),
            artboard: 'Artboard',
            stateMachines: 'State Machine 1',
            autoplay: true,
            onLoad: () => {
                riveInstance.resizeDrawingSurfaceToCanvas();
                const inputs = riveInstance.stateMachineInputs('State Machine 1');
                const [inputL, inputM, inputR] = ['L', 'M', 'R'].map(n => inputs.find(i => i.name === n));

                updateBools = () => {
                    if (inputL) inputL.value = (currentState === 0);
                    if (inputM) inputM.value = (currentState === 1);
                    if (inputR) inputR.value = (currentState === 2);
                };
                updateBools(); 
            }
        });

        window.addEventListener('resize', () => riveInstance?.resizeDrawingSurfaceToCanvas());
    </script>
</body>
</html>
