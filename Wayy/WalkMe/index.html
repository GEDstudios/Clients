<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Scroll States</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A3F;
            overflow: hidden; /* Blocks native scroll */
            /* Prevents pull-to-refresh and overscroll on mobile */
            overscroll-behavior-y: none; 
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #rive-container {
            /* Defined size prevents pixelation */
            width: 800px; 
            height: 800px;
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <div id="rive-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://unpkg.com/@rive-app/webgl2/rive.js"></script>
    <script>
        const riveInstance = new rive.Rive({
            src: 'rotategirl2.riv',
            canvas: document.getElementById('canvas'),
            artboard: 'Artboard',
            stateMachines: 'State Machine 1',
            autoplay: true,
            onLoad: () => {
                riveInstance.resizeDrawingSurfaceToCanvas();

                const inputs = riveInstance.stateMachineInputs('State Machine 1');
                const inputL = inputs.find(i => i.name === 'L');
                const inputM = inputs.find(i => i.name === 'M');
                const inputR = inputs.find(i => i.name === 'R');

                // State index: 0 = L, 1 = M, 2 = R
                let currentState = 0; 
                let isThrottled = false;

                const updateBools = () => {
                    if (inputL) inputL.value = (currentState === 0);
                    if (inputM) inputM.value = (currentState === 1);
                    if (inputR) inputR.value = (currentState === 2);
                };

                updateBools(); // Initialize L as active

                // Centralized function to handle state changes
                const changeState = (direction) => {
                    if (isThrottled) return;

                    let changed = false;
                    
                    if (direction === 1 && currentState < 2) {
                        currentState++; // Scroll/Swipe down: L -> M -> R
                        changed = true;
                    } else if (direction === -1 && currentState > 0) {
                        currentState--; // Scroll/Swipe up: R -> M -> L
                        changed = true;
                    }

                    if (changed) {
                        updateBools();
                        isThrottled = true;
                        setTimeout(() => { isThrottled = false; }, 600); // 600ms debounce
                    }
                };

                // Desktop wheel event
                window.addEventListener('wheel', (e) => {
                    changeState(e.deltaY > 0 ? 1 : -1);
                }, { passive: false });

                // Mobile touch events
                let touchStartY = 0;

                window.addEventListener('touchstart', (e) => {
                    touchStartY = e.touches[0].clientY;
                }, { passive: false });

                window.addEventListener('touchmove', (e) => {
                    e.preventDefault(); // Strictly block native scroll/bounce
                }, { passive: false });

                window.addEventListener('touchend', (e) => {
                    let touchEndY = e.changedTouches[0].clientY;
                    let deltaY = touchStartY - touchEndY;

                    // 30px threshold to distinguish a swipe from a tap
                    if (deltaY > 30) {
                        changeState(1); // Swiped up -> triggers scroll down logic
                    } else if (deltaY < -30) {
                        changeState(-1); // Swiped down -> triggers scroll up logic
                    }
                });
            }
        });

        window.addEventListener('resize', () => {
            if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
        });
    </script>
</body>
</html>
