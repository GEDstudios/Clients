<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Scroll States</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A3F;
            overflow: hidden; 
            overscroll-behavior-y: none; 
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #rive-container {
            width: 800px; 
            height: 800px;
            max-width: 100vw;
            max-height: 100vh;
        }
        canvas {
            width: 100%;
            height: 100%;
            pointer-events: none; /* Prevents Rive from intercepting touch events */
        }
    </style>
</head>
<body>

    <div id="rive-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://unpkg.com/@rive-app/webgl2/rive.js"></script>
    <script>
        let currentState = 0; 
        let isThrottled = false;
        let updateBools = () => {}; // Placeholder until Rive loads

        const changeState = (direction) => {
            if (isThrottled) return;

            let changed = false;
            
            if (direction === 1 && currentState < 2) {
                currentState++; 
                changed = true;
            } else if (direction === -1 && currentState > 0) {
                currentState--; 
                changed = true;
            }

            if (changed) {
                updateBools();
                isThrottled = true;
                setTimeout(() => { isThrottled = false; }, 600); 
            }
        };

        // Desktop Wheel
        document.addEventListener('wheel', (e) => {
            changeState(e.deltaY > 0 ? 1 : -1);
        }, { passive: false });

        // Mobile Touch
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            
            let touchCurrentY = e.touches[0].clientY;
            let deltaY = touchStartY - touchCurrentY;

            // 40px swipe threshold
            if (Math.abs(deltaY) > 40) {
                changeState(deltaY > 0 ? 1 : -1);
                // Reset origin to prevent rapid firing or queued swipes while throttled
                touchStartY = touchCurrentY; 
            }
        }, { passive: false });

        // Initialize Rive
        const riveInstance = new rive.Rive({
            src: 'rotategirl2.riv',
            canvas: document.getElementById('canvas'),
            artboard: 'Artboard',
            stateMachines: 'State Machine 1',
            autoplay: true,
            onLoad: () => {
                riveInstance.resizeDrawingSurfaceToCanvas();

                const inputs = riveInstance.stateMachineInputs('State Machine 1');
                const inputL = inputs.find(i => i.name === 'L');
                const inputM = inputs.find(i => i.name === 'M');
                const inputR = inputs.find(i => i.name === 'R');

                updateBools = () => {
                    if (inputL) inputL.value = (currentState === 0);
                    if (inputM) inputM.value = (currentState === 1);
                    if (inputR) inputR.value = (currentState === 2);
                };

                updateBools(); 
            }
        });

        window.addEventListener('resize', () => {
            if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
        });
    </script>
</body>
</html>
