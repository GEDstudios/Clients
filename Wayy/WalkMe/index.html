<script src="https://unpkg.com/@rive-app/webgl2/rive.js"></script>
    <script>
        let currentState = 0; 
        let isThrottled = false;
        let updateBools = () => {}; 

        const changeState = (direction) => {
            if (isThrottled) return;

            let changed = false;
            
            if (direction === 1 && currentState < 2) {
                currentState++; 
                changed = true;
            } else if (direction === -1 && currentState > 0) {
                currentState--; 
                changed = true;
            }

            if (changed) {
                updateBools();
                isThrottled = true;
                setTimeout(() => { isThrottled = false; }, 600); 
            }
        };

        // Desktop Wheel
        document.addEventListener('wheel', (e) => {
            changeState(e.deltaY > 0 ? 1 : -1);
        }, { passive: false });

        // Mobile Touch
        let touchStartY = 0;
        let hasSwiped = false; // Prevents multiple triggers in a single drag

        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
            hasSwiped = false; // Reset when finger touches screen
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            
            if (hasSwiped) return; // Stop if already swiped during this touch

            let touchCurrentY = e.touches[0].clientY;
            let deltaY = touchStartY - touchCurrentY;

            if (Math.abs(deltaY) > 50) { // Increased threshold slightly for intent
                changeState(deltaY > 0 ? 1 : -1);
                hasSwiped = true; // Lock until finger is lifted
            }
        }, { passive: false });

        // Initialize Rive
        const riveInstance = new rive.Rive({
            src: 'rotategirl2.riv',
            canvas: document.getElementById('canvas'),
            artboard: 'Artboard',
            stateMachines: 'State Machine 1',
            autoplay: true,
            onLoad: () => {
                riveInstance.resizeDrawingSurfaceToCanvas();

                const inputs = riveInstance.stateMachineInputs('State Machine 1');
                const inputL = inputs.find(i => i.name === 'L');
                const inputM = inputs.find(i => i.name === 'M');
                const inputR = inputs.find(i => i.name === 'R');

                updateBools = () => {
                    if (inputL) inputL.value = (currentState === 0);
                    if (inputM) inputM.value = (currentState === 1);
                    if (inputR) inputR.value = (currentState === 2);
                };

                updateBools(); 
            }
        });

        window.addEventListener('resize', () => {
            if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
        });
    </script>
