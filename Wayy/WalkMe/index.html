<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rive Scroll States</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #0A0A3F;
            overflow: hidden; 
            overscroll-behavior-y: none; 
            touch-action: none;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        #rive-container {
            width: 1920px; 
            height: 1080px;
            max-width: 100vw;
            max-height: 100vh;
            aspect-ratio: 16 / 9; /* Maintains dimensions when scaled down */
        }
        canvas {
            width: 100%;
            height: 100%;
            pointer-events: none; 
        }
    </style>
</head>
<body>

    <div id="rive-container">
        <canvas id="canvas"></canvas>
    </div>

    <script src="https://unpkg.com/@rive-app/webgl2/rive.js"></script>
    <script>
        let currentState = 0; 
        let isThrottled = false;
        let throttleTimer;
        let updateBools = () => {}; 

        const changeState = (direction) => {
            let changed = false;
            
            if (direction === 1 && currentState < 2) {
                currentState++; 
                changed = true;
            } else if (direction === -1 && currentState > 0) {
                currentState--; 
                changed = true;
            }

            if (changed) {
                updateBools();
                isThrottled = true;
                // Base lock time after a successful state change
                throttleTimer = setTimeout(() => { isThrottled = false; }, 800); 
            }
        };

        // Desktop Wheel with Kinetic Scroll Absorber
        document.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) < 10) return; // Ignore micro-scrolls

            if (!isThrottled) {
                changeState(e.deltaY > 0 ? 1 : -1);
            } else {
                // If already locked, extend the lock to absorb kinetic scrolling
                clearTimeout(throttleTimer);
                throttleTimer = setTimeout(() => { isThrottled = false; }, 250);
            }
        }, { passive: false });

        // Mobile Touch
        let touchStartY = 0;

        document.addEventListener('touchstart', (e) => {
            touchStartY = e.touches[0].clientY;
        }, { passive: false });

        document.addEventListener('touchmove', (e) => {
            e.preventDefault(); 
            
            let touchCurrentY = e.touches[0].clientY;
            let deltaY = touchStartY - touchCurrentY;

            if (Math.abs(deltaY) > 40 && !isThrottled) {
                changeState(deltaY > 0 ? 1 : -1);
                touchStartY = touchCurrentY; 
            }
        }, { passive: false });

        // Initialize Rive
        const riveInstance = new rive.Rive({
            src: 'rotategirl2.riv',
            canvas: document.getElementById('canvas'),
            artboard: 'Artboard',
            stateMachines: 'State Machine 1',
            autoplay: true,
            onLoad: () => {
                riveInstance.resizeDrawingSurfaceToCanvas();

                const inputs = riveInstance.stateMachineInputs('State Machine 1');
                const inputL = inputs.find(i => i.name === 'L');
                const inputM = inputs.find(i => i.name === 'M');
                const inputR = inputs.find(i => i.name === 'R');

                updateBools = () => {
                    if (inputL) inputL.value = (currentState === 0);
                    if (inputM) inputM.value = (currentState === 1);
                    if (inputR) inputR.value = (currentState === 2);
                };

                updateBools(); 
            }
        });

        window.addEventListener('resize', () => {
            if (riveInstance) riveInstance.resizeDrawingSurfaceToCanvas();
        });
    </script>
</body>
</html>
